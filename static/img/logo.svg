<svg viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="20%" stop-color="#c8c8c8"/>
      <stop offset="40%" stop-color="#f5f5f5"/>
      <stop offset="50%" stop-color="#b8b8b8"/>
      <stop offset="60%" stop-color="#f0f0f0"/>
      <stop offset="80%" stop-color="#a8a8a8"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </linearGradient>
    <linearGradient id="chrome-stroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#888888" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#cccccc" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Stylized cursive RRJCAR -->
  <g filter="url(#shadow)">
    <!-- R1 - flowing R -->
    <path d="M30,130 L30,40 Q30,25 45,25 L70,25 Q90,25 90,45 Q90,65 70,65 L50,65 L95,130"
          fill="none" stroke="url(#chrome)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <!-- R2 - flowing R -->
    <path d="M110,130 L110,40 Q110,25 125,25 L150,25 Q170,25 170,45 Q170,65 150,65 L130,65 L175,130"
          fill="none" stroke="url(#chrome)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <!-- J - swooping J -->
    <path d="M195,25 L195,95 Q195,135 165,135 Q155,135 150,128"
          fill="none" stroke="url(#chrome)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <!-- C - open curve -->
    <path d="M280,40 Q260,20 240,30 Q215,45 215,80 Q215,115 240,128 Q260,138 280,120"
          fill="none" stroke="url(#chrome)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <!-- A - pointed with crossbar -->
    <path d="M295,130 L325,30 L355,130 M305,90 L345,90"
          fill="none" stroke="url(#chrome)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <!-- R3 - flowing R -->
    <path d="M370,130 L370,40 Q370,25 385,25 L410,25 Q430,25 430,45 Q430,65 410,65 L390,65 L435,130"
          fill="none" stroke="url(#chrome)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </g>
  <!-- Highlight stroke -->
  <g opacity="0.15">
    <path d="M30,130 L30,40 Q30,25 45,25 L70,25 Q90,25 90,45 Q90,65 70,65 L50,65 L95,130"
          fill="none" stroke="url(#chrome-stroke)" stroke-width="3" stroke-linecap="round"/>
    <path d="M110,130 L110,40 Q110,25 125,25 L150,25 Q170,25 170,45 Q170,65 150,65 L130,65 L175,130"
          fill="none" stroke="url(#chrome-stroke)" stroke-width="3" stroke-linecap="round"/>
    <path d="M195,25 L195,95 Q195,135 165,135 Q155,135 150,128"
          fill="none" stroke="url(#chrome-stroke)" stroke-width="3" stroke-linecap="round"/>
    <path d="M280,40 Q260,20 240,30 Q215,45 215,80 Q215,115 240,128 Q260,138 280,120"
          fill="none" stroke="url(#chrome-stroke)" stroke-width="3" stroke-linecap="round"/>
    <path d="M295,130 L325,30 L355,130 M305,90 L345,90"
          fill="none" stroke="url(#chrome-stroke)" stroke-width="3" stroke-linecap="round"/>
    <path d="M370,130 L370,40 Q370,25 385,25 L410,25 Q430,25 430,45 Q430,65 410,65 L390,65 L435,130"
          fill="none" stroke="url(#chrome-stroke)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
