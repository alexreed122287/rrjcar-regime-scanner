<svg viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Multi-stop chrome gradient for 3D metallic look -->
    <linearGradient id="chrome3d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8c8c8"/>
      <stop offset="12%" stop-color="#8a8a8a"/>
      <stop offset="28%" stop-color="#e0e0e0"/>
      <stop offset="42%" stop-color="#a8a8a8"/>
      <stop offset="50%" stop-color="#f2f2f2"/>
      <stop offset="58%" stop-color="#a0a0a0"/>
      <stop offset="72%" stop-color="#d8d8d8"/>
      <stop offset="88%" stop-color="#888888"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
    <!-- Inner highlight for 3D depth -->
    <linearGradient id="innerLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Ambient glow -->
    <filter id="ambientGlow">
      <feGaussianBlur stdDeviation="4" result="glow"/>
      <feColorMatrix in="glow" type="matrix" values="0.8 0.8 0.8 0 0  0.8 0.8 0.8 0 0  0.8 0.8 0.8 0 0  0 0 0 0.12 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle inner shadow for depth -->
    <filter id="innerDepth">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#ambientGlow)">
    <!-- R1: Flowing rounded R with curved bowl and sweeping leg -->
    <g filter="url(#innerDepth)">
      <path d="M30,130 L30,42 Q30,25 48,25 L68,25 Q95,25 95,50 Q95,68 78,73 L58,76 Q48,77 56,87 L90,130"
            fill="none" stroke="url(#chrome3d)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M30,130 L30,42 Q30,25 48,25 L68,25 Q95,25 95,50 Q95,68 78,73 L58,76 Q48,77 56,87 L90,130"
            fill="none" stroke="url(#innerLight)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- R2: Second R, slightly connected feel -->
    <g filter="url(#innerDepth)">
      <path d="M110,130 L110,42 Q110,25 128,25 L148,25 Q175,25 175,50 Q175,68 158,73 L138,76 Q128,77 136,87 L170,130"
            fill="none" stroke="url(#chrome3d)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M110,130 L110,42 Q110,25 128,25 L148,25 Q175,25 175,50 Q175,68 158,73 L138,76 Q128,77 136,87 L170,130"
            fill="none" stroke="url(#innerLight)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- J: Tall stem with deep swooping hook -->
    <g filter="url(#innerDepth)">
      <path d="M210,25 L210,100 Q210,138 180,138 Q162,138 155,120"
            fill="none" stroke="url(#chrome3d)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M210,25 L210,100 Q210,138 180,138 Q162,138 155,120"
            fill="none" stroke="url(#innerLight)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- C: Wide elegant open curve -->
    <g filter="url(#innerDepth)">
      <path d="M295,42 Q275,20 252,30 Q225,45 225,78 Q225,115 252,128 Q275,138 295,120"
            fill="none" stroke="url(#chrome3d)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M295,42 Q275,20 252,30 Q225,45 225,78 Q225,115 252,128 Q275,138 295,120"
            fill="none" stroke="url(#innerLight)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- A: Smooth pointed arch with floating crossbar -->
    <g filter="url(#innerDepth)">
      <path d="M315,130 L348,28 L381,130"
            fill="none" stroke="url(#chrome3d)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M328,92 L368,92"
            fill="none" stroke="url(#chrome3d)" stroke-width="11" stroke-linecap="round"/>
      <path d="M315,130 L348,28 L381,130"
            fill="none" stroke="url(#innerLight)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M328,92 L368,92"
            fill="none" stroke="url(#innerLight)" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- R3: Final R, matching style -->
    <g filter="url(#innerDepth)">
      <path d="M405,130 L405,42 Q405,25 423,25 L443,25 Q470,25 470,50 Q470,68 453,73 L433,76 Q423,77 431,87 L465,130"
            fill="none" stroke="url(#chrome3d)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M405,130 L405,42 Q405,25 423,25 L443,25 Q470,25 470,50 Q470,68 453,73 L433,76 Q423,77 431,87 L465,130"
            fill="none" stroke="url(#innerLight)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
