<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#101114">
    <title>RRJCAR Regime Scanner</title>
    <link rel="stylesheet" href="/static/css/terminal.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <div class="header">
        <h1><span>R</span>RJCAR Regime Scanner</h1>
        <div class="header-actions">
            <span id="scan-time" style="color: var(--text-dim); font-size: 0.7rem; font-family: var(--font-mono);"></span>
            <button class="btn-primary" id="btn-scan">Scan</button>
        </div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel">
        <div class="settings-toggle" id="settings-toggle">$</div>
        <div class="settings-body" id="settings-body">
            <div class="settings-grid">
                <div class="setting-group">
                    <label>Watchlist</label>
                    <select id="setting-watchlist"></select>
                </div>
                <div class="setting-group">
                    <label>Custom Tickers</label>
                    <input type="text" id="setting-custom-tickers" placeholder="AAPL,TSLA,NVDA">
                </div>
                <div class="setting-group">
                    <label>Strategy</label>
                    <select id="setting-strategy">
                        <option value="v2">V2 (12-conf, calls)</option>
                        <option value="v1">V1 (8-conf, classic)</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Min Confirmations</label>
                    <input type="number" id="setting-min-confs" min="1" max="12" value="6">
                </div>
                <div class="setting-group">
                    <label>Regime Confirm Bars</label>
                    <input type="number" id="setting-regime-confirm" min="1" max="10" value="2">
                </div>
                <div class="setting-group">
                    <label>Cooldown Bars</label>
                    <input type="number" id="setting-cooldown" min="0" max="20" value="3">
                </div>
                <div class="setting-group">
                    <label>Capital ($)</label>
                    <input type="number" id="setting-capital" min="1000" step="1000" value="100000">
                </div>
                <div class="setting-group">
                    <label>Max Workers</label>
                    <input type="number" id="setting-max-workers" min="1" max="20" value="6">
                </div>
            </div>
        </div>
    </div>

    <!-- Summary Metrics -->
    <div class="metrics-grid">
        <div class="metric-card"><div class="label">Scanned</div><div class="value" id="metric-scanned">--</div></div>
        <div class="metric-card"><div class="label">Bullish</div><div class="value bull" id="metric-bullish">--</div></div>
        <div class="metric-card"><div class="label">Bearish</div><div class="value bear" id="metric-bearish">--</div></div>
        <div class="metric-card"><div class="label">Neutral</div><div class="value neutral" id="metric-neutral">--</div></div>
        <div class="metric-card"><div class="label">Entries</div><div class="value bull" id="metric-entries">--</div></div>
        <div class="metric-card"><div class="label">Exits</div><div class="value bear" id="metric-exits">--</div></div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="screener">Screener</button>
        <button class="tab-btn" data-tab="drilldown">Drill-Down</button>
        <button class="tab-btn" data-tab="heatmap">Heatmap</button>
        <button class="tab-btn" data-tab="distribution">Distribution</button>
    </div>

    <!-- Tab: Screener -->
    <div class="tab-content active" id="tab-screener">
        <div class="filter-bar">
            <label>Filter</label>
            <select id="filter-signal">
                <option value="All">All Signals</option>
                <option value="ENTER">ENTER</option>
                <option value="CONFIRMING">CONFIRMING</option>
                <option value="HOLD">HOLD</option>
                <option value="EXIT">EXIT</option>
                <option value="NEUTRAL">NEUTRAL</option>
                <option value="BEARISH">BEARISH</option>
            </select>
            <label>Sort</label>
            <select id="sort-by">
                <option value="signal">Signal Priority</option>
                <option value="confirmations">Confirmations</option>
                <option value="rsi">RSI (Low first)</option>
                <option value="change">1D Change</option>
            </select>
        </div>
        <div id="screener-content">
            <div style="text-align:center; padding:3rem; color:var(--text-dim);">
                Select a watchlist and click <strong style="color:var(--accent);">Scan</strong> to begin.
            </div>
        </div>
    </div>

    <!-- Tab: Drill-Down -->
    <div class="tab-content" id="tab-drilldown">
        <div id="drilldown-content">
            <div style="text-align:center; padding:2rem; color:var(--text-dim);">
                Click a ticker in the Screener to view its analysis.
            </div>
        </div>
    </div>

    <!-- Tab: Heatmap -->
    <div class="tab-content" id="tab-heatmap">
        <div class="chart-container" id="heatmap-chart">
            <div style="text-align:center; padding:2rem; color:var(--text-dim);">Run a scan to see the regime heatmap.</div>
        </div>
    </div>

    <!-- Tab: Distribution -->
    <div class="tab-content" id="tab-distribution">
        <div class="chart-container" id="signal-dist-chart">
            <div style="text-align:center; padding:2rem; color:var(--text-dim);">Run a scan to see signal distribution.</div>
        </div>
    </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay hidden" id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Scanning...</div>
</div>

<!-- Scripts -->
<script src="/static/js/api.js"></script>
<script src="/static/js/charts.js"></script>
<script src="/static/js/screener.js"></script>
<script src="/static/js/drilldown.js"></script>
<script src="/static/js/settings.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
