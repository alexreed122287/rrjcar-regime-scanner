name: Daily Regime Scan

on:
  schedule:
    # 10:00 AM CST = 16:00 UTC (weekdays)
    - cron: '0 16 * * 1-5'
    # 1:00 PM CST = 19:00 UTC (weekdays)
    - cron: '0 19 * * 1-5'
  workflow_dispatch:
    inputs:
      session:
        description: 'Scan session (am or pm)'
        required: false
        default: 'am'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore AM results cache for PM confirmation
      - name: Restore AM scan cache
        if: github.event.schedule == '0 19 * * 1-5'
        uses: actions/cache/restore@v4
        with:
          path: .am_scan_results.json
          key: am-scan-${{ github.run_id }}
          restore-keys: am-scan-

      - name: Determine session
        id: session
        run: |
          if [ "${{ github.event.schedule }}" = "0 16 * * 1-5" ]; then
            echo "session=am" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 19 * * 1-5" ]; then
            echo "session=pm" >> $GITHUB_OUTPUT
          else
            echo "session=${{ github.event.inputs.session || 'am' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run scheduled scan
        env:
          TRADIER_ACCESS_TOKEN: ${{ secrets.TRADIER_ACCESS_TOKEN }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scheduled_scan.py ${{ steps.session.outputs.session }}

      # Save AM results for PM confirmation
      - name: Save AM scan cache
        if: steps.session.outputs.session == 'am'
        uses: actions/cache/save@v4
        with:
          path: .am_scan_results.json
          key: am-scan-${{ github.run_id }}
