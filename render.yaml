services:
  - type: web
    name: hmm-regime-terminal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TRADIER_ACCESS_TOKEN
        sync: false
      - key: TRADIER_ACCOUNT_ID
        sync: false
